<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Semangat Amengg ❤️</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: Arial;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 20px;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.9);
      width: 100%;
      max-width: 360px;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease;
    }

    h2 {
      color: #ff4d6d;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
      color: #444;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    a {
      display: block;
      margin-top: 10px;
      color: #ff4d6d;
      text-decoration: none;
      font-weight: bold;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(20px); }
      to { opacity:1; transform:translateY(0); }
    }
  </style>
</head>

<body>

  <audio id="music" loop>
  <source src="musik2.mp3.mp3" type="audio/mp3">
</audio>

<button onclick="document.getElementById('music').play()">
  Putar Musik 🎵
</button>
  <div class="card">
    <h2>Semangat ya Sayanggggggg 🤍</h2>

    <p>
      Hari Rabu ini kamu pasti bisa melewatinya kok 💪<br><br>
      Kamu ituu kuatt, kamu ituuu hebat, dan aku selalu adaa buat kamuu dan dukung kamu😊<br><br>
      Jangan lupa makan, minumm dan istirahat ya, kesehatan nomor 1 sayangggg❤️
    </p>

    <button onclick="document.getElementById('music').play()">
      Putar Musik 🎵
    </button>

    <a href="page3.html">Lanjut Lagi 👉</a>
  </div>

</body>
</html>
