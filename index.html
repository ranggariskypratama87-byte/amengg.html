<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk Adikkkk Tercintaa ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);

      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      padding: 15px;
    }

    .card {
      width: 100%;
      max-width: 350px;

      background: #ffffff;
      padding: 20px;

      border-radius: 20px;
      text-align: center;

      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      color: #ff4d6d;
      font-size: 20px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #444;
      line-height: 1.5;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;

      border: none;
      border-radius: 12px;

      background: #ff4d6d;
      color: white;
      font-size: 14px;
    }

    a {
      display: block;
      margin-top: 10px;
      color: #ff4d6d;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- 🎵 AUDIO -->
  <audio id="music" loop>
    <source src="musik1.mp3" type="audio/mp3">
  </audio>

  <div class="card">
    <h2>Hai Amengggg kecill 🤍</h2>
    <p>Ada sesuatu buat kamu...</p>

    <button onclick="document.getElementById('music').play()">
      Putar Musik 🎵
    </button>

    <a href="page2.html">Lanjut 💕</a>
  </div>

</body>
</html>
