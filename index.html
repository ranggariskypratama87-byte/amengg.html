<!DOCTYPE html>
<html>
<head>
    <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    text-align: center;
    padding: 20px;
  }

  .card {
    background: rgba(255, 255, 255, 0.9);
    width: 100%;
    max-width: 360px;

    padding: 25px;
    border-radius: 20px;

    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    backdrop-filter: blur(5px);

    animation: fadeIn 1s ease;
  }

  h2 {
    color: #ff4d6d;
    font-size: 22px;
    margin-bottom: 10px;
  }

  p {
    font-size: 14px;
    line-height: 1.6;
    color: #444;
  }

  button {
    margin-top: 15px;
    padding: 12px 18px;

    border: none;
    border-radius: 12px;

    background: #ff4d6d;
    color: white;
    font-size: 14px;

    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
  }

  a {
    display: block;
    margin-top: 12px;
    color: #ff4d6d;
    font-weight: bold;
    text-decoration: none;
  }

  /* animasi masuk */
  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* biar aman di HP kecil */
  @media (max-width: 400px) {
    .card {
      padding: 18px;
    }

    h2 {
      font-size: 20px;
    }

    p {
      font-size: 13px;
    }
  }
</style>
  <meta charset="UTF-8">
  <title>Untukk Adikkkkkk Tercintaaaa ❤️</title>
</head>

<body>

  <audio id="music" loop>
    <source src="musik.mp3" type="audio/mp3">
  </audio>

  <button onclick="document.getElementById('music').play()">
    Putar Musik 🎵
  </button>

</html>
